<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text 3D Animation - Pure HTML/CSS/JS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        html {
            box-sizing: border-box;
        }
        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }

        body {
            background: #191414;
            font-family: 'Montserrat', sans-serif;
            color: #F59B23;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            visibility: hidden;
        }

        .tube {
            position: relative;
            width: 100%;
            height: 24vw;
        }

        .line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            line-height: 1;
            margin: 0;
            letter-spacing: -0.6vw;
            font-size: 18vw;
            white-space: nowrap;
            text-align: center;
        }

        .final__wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .final {
            line-height: 1;
            margin: 0;
            font-size: 13vw;
            letter-spacing: -0.5vw;
            white-space: nowrap;
        }

        .char {
            backface-visibility: hidden;
        }

        .logo {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: auto;
        }
    </style>
</head>
<body>

        <div class="tube">
            <h1 class="clone">Testimonials</h1>
        </div>
        <div class="final__wrap"></div>
    </div>

    <script>
        console.clear();

        // Get the core elements
        var container = document.getElementsByClassName("container");
        var tube = document.getElementsByClassName("tube");
        var clone = document.getElementsByClassName("clone");
        var finalWrap = document.getElementsByClassName("final__wrap");

        // Create the cloned nodes, append and add classes for required HTML structure - WARNING: Ugly code below 💩
        var finalClone = clone[0].cloneNode(true); // clone the clean node and append to final__wrap
        finalWrap[0].appendChild(finalClone).classList.add("final");

        for (var i = 0; i < 2; i++) {
            var newClone = clone[0].cloneNode(true); // clone the header
            var lineClass = "line"+(i+2); // create class name to append
            tube[0].appendChild(newClone); // append the clone
            clone[i].classList.add("line"); // add cline lass
            clone[i+1].classList.add(lineClass); // add incremented line class
        }
        clone[0].classList.add("line1"); // add line1 class to the first node

        // Yuk! Now for the fun stuff…

        // Show it to me!
        gsap.set('.container', {
            visibility: 'visible'
        });

        // Get cloned elements
        var lines = document.getElementsByClassName("line");
        var line1 = document.getElementsByClassName("line1");
        var line2 = document.getElementsByClassName("line2");
        var line3 = document.getElementsByClassName("line3");
        var final = document.getElementsByClassName("final");

        // Split text characters manually (since we don't have SplitText)
        function splitText(element) {
            const text = element.textContent || '';
            const chars = [];
            for (let i = 0; i < text.length; i++) {
                const span = document.createElement('span');
                span.textContent = text[i];
                span.classList.add('char');
                chars.push(span);
            }
            element.innerHTML = '';
            chars.forEach(char => element.appendChild(char));
            return chars;
        }

        var splitLine1 = splitText(line1[0]);
        var splitLine2 = splitText(line2[0]);
        var splitLine3 = splitText(line3[0]);
        var splitFinal = splitText(final[0]);

        // Set up vars
        var animTime = 0.9; // baseline animation time for each stagger
        var width = document.documentElement.clientWidth; // viewport width
        var height = document.documentElement.clientHeight; // viewport height
        var depth = -width/8; // rotation depth based on viewport width
        var tOrigin = "50% 50% "+depth; // transform origin as a factor of viewport width to allow for different device widths

        // Init 3D perspective
        gsap.set([lines, final], { perspective:700, transformStyle:"preserve-3d"});

        // Animate Timeline
        var linesTL = gsap.timeline();
        linesTL.fromTo(splitLine1, animTime, { rotationX: -90  }, { rotationX: 90, ease:"none", transformOrigin: tOrigin }, 0.08)
            .fromTo(splitLine2, animTime, { rotationX: -90 }, { rotationX: 90, ease:"none", transformOrigin: tOrigin }, 0.08, 0.45)
            .fromTo(splitLine3, animTime, { rotationX: -90 }, { rotationX: 90, ease:"none", transformOrigin: tOrigin }, 0.08, 0.9)
            .fromTo(splitFinal, animTime*1.8, { rotationX: -90, alpha: 0 }, { rotationX: 0, alpha: 1, ease:"power2.out", transformOrigin: tOrigin }, 0.06, 1.6)
            .fromTo(final, animTime*5, { y:height/6 }, { y:-height/6 , ease:"power4.out" }, 2.0 )

        // Rotate final text on mouse move
        window.addEventListener("mousemove", onMouseMove);

        function onMouseMove(e) {
            var sxPos = (e.pageX / width*100 - 50)*2 ;
            var syPos = (e.pageY / height*100 - 50)*2;
            gsap.to(finalWrap, 3, {
                rotationY: 0.04 * sxPos,
                rotationX: -0.04 * syPos,
                transformOrigin: "center center -800",
                ease: "power2.out"
            });
        }
    </script>
